<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Signing out…</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: #f4f5f7; color: #222; margin: 0; padding: 0;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; padding: 32px 40px; border-radius: 8px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08); text-align: center; max-width: 360px; }
        .spinner { width: 36px; height: 36px; margin: 0 auto 16px;
                   border: 3px solid #e1e4e8; border-top-color: #0d6efd; border-radius: 50%;
                   animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        button { background: #0d6efd; color: #fff; border: 0; border-radius: 4px;
                 padding: 10px 20px; font-size: 14px; cursor: pointer; }
        .hint { color: #6c757d; font-size: 13px; margin-top: 12px; }
    </style>
</head>
<body>
<div class="card">
    <div class="spinner"></div>
    <h2>Signing you out…</h2>
    <form id="logoutForm" method="post" th:action="@{/logout}">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>
        <input type="hidden" name="returnTo" th:value="${returnTo}"/>
        <noscript>
            <p class="hint">JavaScript is disabled. Click the button to finish signing out.</p>
            <button type="submit">Continue</button>
        </noscript>
    </form>
    <script>
        document.getElementById("logoutForm").submit();
    </script>
</div>
</body>
</html>
