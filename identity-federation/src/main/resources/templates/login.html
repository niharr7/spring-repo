<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Sign In</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f7f8fa; }
    .card {
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      max-width: 520px; margin: 4rem auto; padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    label { display: block; font-weight: bold; margin-bottom: 0.5rem; }
    input[type="email"] {
      width: 100%; padding: 0.75rem; border: 1px solid #bbb;
      border-radius: 4px; box-sizing: border-box;
    }
    button {
      margin-top: 1rem; padding: 0.75rem 1rem; border: 0;
      border-radius: 4px; background: #0078d4; color: #fff; cursor: pointer;
    }
    .error { color: #b00020; margin-top: 1rem; }
    .hint { color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="hint" th:if="${selectedAppName}" th:text="'Application: ' + ${selectedAppName}">Application: Legacy App</p>
    <p class="hint">Enter your work email if tenant discovery could not be resolved from the request.</p>
    <div th:if="${apps != null and !#maps.isEmpty(apps) and selectedAppId == null}">
      <p class="hint">Choose an application entry point:</p>
      <ul>
        <li th:each="appEntry : ${apps.entrySet()}">
          <a th:href="@{|/apps/${appEntry.key}/sso/login|}"
             th:text="${appEntry.value.displayName != null and !appEntry.value.displayName.isBlank()} ? ${appEntry.value.displayName} : ${appEntry.key}">App</a>
        </li>
      </ul>
    </div>
    <form method="post" th:action="${formAction}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <label for="email">Work email</label>
      <input id="email" name="email" type="email" th:value="${email}" placeholder="name@company.com" required/>
      <button type="submit">Continue</button>
    </form>
    <p class="error" th:if="${error}" th:text="${error}">Unable to resolve tenant.</p>
  </div>
</body>
</html>
