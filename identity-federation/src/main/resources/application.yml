# ════════════════════════════════════════════════════════════════
#  sso-connector — LIBRARY DEFAULTS
#  Shipped inside the JAR. Contains no secrets and no
#  customer-specific values. Customers override values below by
#  placing their own application.yml next to the JAR, or via
#    --spring.config.additional-location=file:/path/to/config/
# ════════════════════════════════════════════════════════════════

server:
  port: 8081
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: sso-connector

sso:
  connector:
    registration-id: oidc
    provider-display-name: OpenID Connect
    # legacy-app-url   ── REQUIRED, supplied by customer
    # app-path-prefix  ── REQUIRED, supplied by customer
    # trust-secret     ── REQUIRED, resolved from secret provider
    tenant-discovery:
      order:
        - host
        - path
        - query
        - email-domain
      query-param-name: tenant
    # tenants:
    #   customer-a:
    #     registration-id: oidc-customer-a
    #     provider-display-name: Customer A SSO
    #     hosts: [customer-a.example.com]
    #     paths: [customer-a]
    #     query-values: [customer-a]
    #     email-domains: [customer-a.com]
    claims:
      username: preferred_username
      email: email
      display-name: name
    logout:
      single-logout-enabled: false
      post-logout-redirect-uri: "{baseUrl}/"
    login:
      # Optional OIDC prompt parameter. Set to "login" to force credential
      # entry on every sign-in. Leave blank for default provider behavior.
      prompt: ""
    headers:
      user: X-SSO-User
      email: X-SSO-Email
      name: X-SSO-Name
      roles: X-SSO-Roles
    public-paths:
      - /
      - /health
      - /error
      - /webjars/**
      - /css/**

logging:
  level:
    org.springframework.security: INFO
    com.example.sso: INFO

