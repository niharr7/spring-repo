# ────────────────────────────────────────────────────────────────
# Tenant branding registry for the legacy login landing page.
#
# Format:
#   <tenantId>.displayName = Human readable name shown on the page
#   <tenantId>.logo        = Logo URL (absolute or context-relative)
#   <tenantId>.color       = Primary CSS color for the Sign-in button
#   <tenantId>.lead        = One-line intro text shown above the button
#
# The "default" entries are used when no tenant is resolved from the
# request (?tenant= query parameter) or environment.
#
# Logos can be placed under src/main/webapp/static/ and referenced as
# /static/<file>.png — the JSP prefixes the context path automatically.
# ────────────────────────────────────────────────────────────────

default.displayName = Corporate Portal
default.logo        = /static/logo.png
default.color       = #007bff
default.lead        = Welcome. Click below to sign in with your corporate account.

acme.displayName    = ACME Corp
acme.logo           = /static/acme.png
acme.color          = #0052CC
acme.lead           = Welcome to the ACME portal. Sign in with your ACME account.

contoso.displayName = Contoso Ltd
contoso.logo        = /static/contoso.png
contoso.color       = #7B1FA2
contoso.lead        = Welcome to the Contoso portal. Sign in with your Contoso account.

blackrock.displayName = BlackRock
blackrock.logo        = /static/blackrock.png
blackrock.color       = #111827
blackrock.lead        = Welcome to the BlackRock portal. Sign in with your BlackRock account.
